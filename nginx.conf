server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        try_files $uri /index.html;
    }

    location /static/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        try_files $uri =404;
    }

    # Bridge legacy CRA bundles to force migration into the new Vite shell.
    location ~* ^/static/js/.*\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Content-Type "application/javascript" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        try_files /legacy-bridge.js =404;
    }

    location ~* ^/static/css/.*\.css$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Content-Type "text/css" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        try_files /legacy-bridge.css =404;
    }

    location ~* ^/static/media/.*$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        return 204;
    }

    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        return 410;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /api/ {
        proxy_pass https://ementas-api.app.ic.ufba.br;
        proxy_http_version 1.1;
        proxy_set_header Host ementas-api.app.ic.ufba.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Clear-Site-Data "\"cache\", \"storage\", \"executionContexts\"" always;
        try_files $uri =404;
    }
}
